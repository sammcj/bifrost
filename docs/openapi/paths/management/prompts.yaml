# Prompt Repository paths

folders:
  get:
    operationId: listFolders
    summary: List folders
    description: Returns all prompt folders.
    tags:
      - Prompt Repository
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              type: object
              properties:
                folders:
                  type: array
                  items:
                    $ref: '../../schemas/management/prompts.yaml#/Folder'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

  post:
    operationId: createFolder
    summary: Create folder
    description: Creates a new prompt folder.
    tags:
      - Prompt Repository
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/prompts.yaml#/CreateFolderRequest'
    responses:
      '200':
        description: Folder created
        content:
          application/json:
            schema:
              type: object
              properties:
                folder:
                  $ref: '../../schemas/management/prompts.yaml#/Folder'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

folders-by-id:
  get:
    operationId: getFolder
    summary: Get folder
    description: Returns a folder by ID.
    tags:
      - Prompt Repository
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              type: object
              properties:
                folder:
                  $ref: '../../schemas/management/prompts.yaml#/Folder'
      '404':
        description: Folder not found
        content:
          application/json:
            schema:
              $ref: '../../schemas/inference/common.yaml#/BifrostError'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

  put:
    operationId: updateFolder
    summary: Update folder
    description: Updates a folder's name or description.
    tags:
      - Prompt Repository
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/prompts.yaml#/UpdateFolderRequest'
    responses:
      '200':
        description: Folder updated
        content:
          application/json:
            schema:
              type: object
              properties:
                folder:
                  $ref: '../../schemas/management/prompts.yaml#/Folder'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '404':
        description: Folder not found
        content:
          application/json:
            schema:
              $ref: '../../schemas/inference/common.yaml#/BifrostError'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

  delete:
    operationId: deleteFolder
    summary: Delete folder
    description: Deletes a folder and cascades to contained prompts.
    tags:
      - Prompt Repository
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Folder deleted
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/MessageResponse'
      '404':
        description: Folder not found
        content:
          application/json:
            schema:
              $ref: '../../schemas/inference/common.yaml#/BifrostError'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

prompts:
  get:
    operationId: listPrompts
    summary: List prompts
    description: Returns all prompts, optionally filtered by folder.
    tags:
      - Prompt Repository
    parameters:
      - name: folder_id
        in: query
        description: Filter by folder ID
        schema:
          type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              type: object
              properties:
                prompts:
                  type: array
                  items:
                    $ref: '../../schemas/management/prompts.yaml#/Prompt'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

  post:
    operationId: createPrompt
    summary: Create prompt
    description: Creates a new prompt.
    tags:
      - Prompt Repository
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/prompts.yaml#/CreatePromptRequest'
    responses:
      '200':
        description: Prompt created
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  $ref: '../../schemas/management/prompts.yaml#/Prompt'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

prompts-by-id:
  get:
    operationId: getPrompt
    summary: Get prompt
    description: Returns a prompt by ID with its latest version.
    tags:
      - Prompt Repository
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Successful response
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  $ref: '../../schemas/management/prompts.yaml#/Prompt'
      '404':
        description: Prompt not found
        content:
          application/json:
            schema:
              $ref: '../../schemas/inference/common.yaml#/BifrostError'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

  put:
    operationId: updatePrompt
    summary: Update prompt
    description: Updates a prompt's name or folder.
    tags:
      - Prompt Repository
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schemas/management/prompts.yaml#/UpdatePromptRequest'
    responses:
      '200':
        description: Prompt updated
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  $ref: '../../schemas/management/prompts.yaml#/Prompt'
      '400':
        $ref: '../../openapi.yaml#/components/responses/BadRequest'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

  delete:
    operationId: deletePrompt
    summary: Delete prompt
    description: Deletes a prompt and all its versions and sessions.
    tags:
      - Prompt Repository
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    responses:
      '200':
        description: Prompt deleted
        content:
          application/json:
            schema:
              $ref: '../../schemas/management/common.yaml#/MessageResponse'
      '404':
        description: Prompt not found
        content:
          application/json:
            schema:
              $ref: '../../schemas/inference/common.yaml#/BifrostError'
      '500':
        $ref: '../../openapi.yaml#/components/responses/InternalError'

prompt-versions:
